version: "3.8"

services:
  neo4j:
    image: neo4j:5.12.0
    container_name: biomni-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/biomnipassword

  aigen-backend:
    build:
      context: ./backend
      additional_contexts:
        - biomni_repo=../Biomni
    image: jiyeonl/biomni-web_backend
    container_name: aigen-backend
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/biomni_repo:/app/backend_code:$PYTHONPATH
      - BIOMNI_DATA_PATH=/app/data
    volumes:
      # Biomni source (from aigen_work/Biomni)
      - ../Biomni:/app/biomni_repo
      # Backend code (hot-reload)
      - ./backend:/app/backend_code
      # Data storage
      - ./:/app/data
      - ../uploads:/app/uploads
      - ../outputs:/app/outputs
      - ../logs:/app/logs
      - ./reasoning_logs:/app/reasoning_logs
      # Models directory (for local model folder detection)
      - ../models:/app/models
      # Docker socket (for dynamic vLLM container management)
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: ["bash", "-c"]
    command:
      - |
        pip install asyncpg docker -q 2>/dev/null || true
        ./entrypoint.sh
    ports:
      - "8003:8000"
    depends_on:
      - aigen-db
      - neo4j
    restart: unless-stopped

  aigen-db:
    image: postgres:16-alpine
    container_name: aigen-db
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=aigen
      - POSTGRES_PASSWORD=aigen_pass
      - POSTGRES_DB=aigen
    volumes:
      - aigen-pgdata:/var/lib/postgresql/data

  vllm-server:
    image: vllm/vllm-openai:latest
    container_name: vllm-server
    runtime: nvidia
    ports:
      - "30000:8000"
    volumes:
      - ../models:/app/models
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    command: >
      --model /app/models/Ministral-3-3B-Reasoning-2512
      --served-model-name ministral-reasoning
      --port 8000
      --host 0.0.0.0
      --max-model-len 65536
    restart: unless-stopped

volumes:
  aigen-pgdata:
