# Model Registry — 10 models
# Token format mapping per model type

models:
  # ─── Local Models (vLLM) ───
  biomni-r0-32b:
    type: local
    provider: vllm
    local_path: "biomni-r0-32b"
    think_format: "<think>"
    code_execute_format: "<execute>"
    code_result_format: "<observation>"
    tool_result_format: "<observation>"
    solution_format: "<solution>"
    tool_calls_format: null
    available_tools_format: "[AVAILABLE_TOOLS]"
    stop_sequences: ["</solution>"]
    refusal:
      enabled: true
      threshold: 0.7
      max_retries: 3
      temp_decay: 0.7
      min_temp: 0.3
      recovery_tokens: 50
      recovery_method: "temperature_decay"
      estimator: "logprob"
      top_logprobs_num: 5

  ministral-reasoning:
    type: local
    provider: vllm
    local_path: "Ministral-3-3B-Reasoning-2512"
    use_llm_retrieval: true
    think_format: "[THINK]"
    code_execute_format: "[EXECUTE]"
    code_result_format: "[OBSERVATION]"
    tool_result_format: "[TOOL_RESULTS]"
    solution_format: "[SOLUTION]"
    tool_calls_format: "[TOOL_CALLS]...[ARGS]"
    available_tools_format: "[AVAILABLE_TOOLS]"
    stop_sequences: ["[/EXECUTE]", "[/SOLUTION]", "[/TOOL_RESULTS]", "[/OBSERVATION]"]
    system_prompt: |
      You are Aigen R0, a helpful biomedical research assistant.
      You follow these instructions in all languages, and always respond to the user in the language they use or request.
      When the user's question is not clear or ambiguous, ask for clarification rather than guessing.

      # HOW YOU SHOULD THINK AND ANSWER

      First draft your thinking process (inner monologue) until you arrive at a response. Format your response using Markdown, and use LaTeX for any mathematical equations. Write both your thoughts and the response in the same language as the input.

      Your thinking process must follow the template below:[THINK]Your thoughts or/and draft, like working through an exercise on scratch paper. Be as casual and as long as you want until you are confident to generate the response to the user.[/THINK]Here, provide a self-contained response.
    refusal:
      enabled: true
      threshold: 0.7
      max_retries: 3
      temp_decay: 0.7
      min_temp: 0.3
      recovery_tokens: 50
      recovery_method: "temperature_decay"
      estimator: "logprob"
      top_logprobs_num: 5

  aigen-r0:
    type: local
    provider: vllm
    local_path: "aigen-r0"
    think_format: "[THINK]"
    code_execute_format: "[EXECUTE]"
    code_result_format: "[OBSERVATION]"
    tool_result_format: "[TOOL_RESULTS]"
    solution_format: "[SOLUTION]"
    tool_calls_format: "[TOOL_CALLS]...[ARGS]"
    available_tools_format: "[AVAILABLE_TOOLS]"
    stop_sequences: ["[/EXECUTE]", "[/SOLUTION]", "[/TOOL_RESULTS]"]
    refusal:
      enabled: true
      threshold: 0.7
      max_retries: 3
      temp_decay: 0.7
      min_temp: 0.3
      recovery_tokens: 50
      recovery_method: "temperature_decay"
      estimator: "logprob"
      top_logprobs_num: 5

  aigen-r0-3b:
    type: local
    provider: vllm
    local_path: "Aigen-R0-3B"
